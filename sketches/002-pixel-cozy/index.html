<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>校对鸭 · 像素小屋</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Zpix&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; image-rendering: pixelated; }
  :root {
    --bg: #f0e6c8;
    --wood: #d4a574;
    --wood-dark: #a67c52;
    --brand: #ffb84d;
    --brand-dark: #e88b1a;
    --paper: #fffaeb;
    --ink: #4a3520;
    --ink-soft: #8b6f4f;
    --grass: #7ab547;
    --water: #6cc4dd;
  }
  body {
    font-family: 'Zpix', 'Press Start 2P', 'PingFang SC', monospace;
    background:
      linear-gradient(180deg, #ffe9b3 0%, #ffd485 100%);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    color: var(--ink);
    font-size: 12px;
    line-height: 1.6;
  }
  /* SidePanel */
  .panel {
    width: 420px; min-height: 720px;
    background: var(--paper);
    padding: 16px;
    position: relative;
    /* 像素风 chunky border */
    box-shadow:
      0 0 0 4px var(--ink),
      0 0 0 8px var(--brand),
      0 12px 0 8px var(--wood-dark);
  }
  /* Header */
  header {
    background: var(--brand);
    padding: 12px 14px;
    margin: -16px -16px 16px;
    border-bottom: 4px solid var(--ink);
    display: flex; align-items: center; gap: 12px;
    position: relative;
  }
  /* pixel duck 8x8 blocks */
  .duck-pixel {
    width: 48px; height: 48px;
    position: relative;
    background:
      /* head + body 抽象 */
      linear-gradient(var(--brand-dark), var(--brand-dark)) 8px 0/32px 32px,
      linear-gradient(#ffe580, #ffe580) 8px 8px/24px 8px,
      linear-gradient(#ff6b1a, #ff6b1a) 24px 32px/16px 6px,
      linear-gradient(var(--ink), var(--ink)) 16px 12px/4px 4px,
      linear-gradient(var(--ink), var(--ink)) 24px 12px/4px 4px,
      #fff;
    background-repeat: no-repeat;
  }
  .brand h1 {
    font-size: 16px; letter-spacing: 2px; color: var(--paper);
    text-shadow: 2px 2px 0 var(--ink);
    font-weight: 400;
  }
  .brand p {
    font-size: 9px; color: var(--paper); opacity: 0.9;
    margin-top: 4px; letter-spacing: 1px;
  }
  .coins {
    margin-left: auto; padding: 4px 8px;
    background: var(--paper); border: 3px solid var(--ink);
    font-size: 10px; box-shadow: 3px 3px 0 var(--ink);
    color: var(--ink);
  }
  /* Engine "bag" —— 像素图标 */
  .engines-hud {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 6px; margin-bottom: 14px;
  }
  .slot {
    background: white; border: 3px solid var(--ink);
    padding: 6px 4px; text-align: center;
    font-size: 9px; letter-spacing: 1px;
    position: relative;
    box-shadow: 3px 3px 0 var(--ink);
  }
  .slot .icon {
    display: block; width: 24px; height: 24px; margin: 0 auto 4px;
    background: var(--brand);
    border: 2px solid var(--ink);
  }
  .slot.active .icon { background: var(--grass); animation: pulse 1s steps(2) infinite; }
  .slot.locked { opacity: 0.5; }
  .slot.locked .icon { background: #aaa; }
  @keyframes pulse { 50% { transform: scale(1.08); } }
  /* mode selector - 卷轴 tabs */
  .mode-scroll {
    display: flex; gap: 0; margin-bottom: 14px;
    background: var(--wood); padding: 4px;
    border: 3px solid var(--ink);
    box-shadow: 3px 3px 0 var(--ink);
  }
  .tab {
    flex: 1; padding: 8px 4px; text-align: center;
    font-size: 10px; letter-spacing: 1px;
    color: var(--paper); cursor: pointer;
    border-right: 2px solid var(--ink);
  }
  .tab:last-child { border-right: none; }
  .tab.active {
    background: var(--paper); color: var(--ink);
    box-shadow: inset 0 -4px 0 var(--brand);
  }
  /* language row */
  .langs {
    display: flex; align-items: stretch; margin-bottom: 12px;
    border: 3px solid var(--ink); box-shadow: 3px 3px 0 var(--ink);
  }
  .lang {
    flex: 1; padding: 10px; text-align: center;
    background: white; font-size: 11px; letter-spacing: 1px;
  }
  .lang.from { background: #ffe580; }
  .lang .flag { font-size: 16px; display: block; margin-bottom: 2px; }
  .swap {
    padding: 0 12px; background: var(--brand);
    display: grid; place-items: center;
    border-left: 3px solid var(--ink);
    border-right: 3px solid var(--ink);
    font-size: 16px; color: var(--ink);
  }
  /* input box - 记事本纸样 */
  .input-scroll {
    background:
      repeating-linear-gradient(180deg, transparent 0 22px, rgba(74,53,32,0.1) 22px 23px);
    border: 3px solid var(--ink);
    padding: 6px 12px 12px;
    margin-bottom: 12px;
    box-shadow: 3px 3px 0 var(--ink);
  }
  .input-scroll textarea {
    width: 100%; min-height: 88px; border: none;
    background: transparent; resize: none; outline: none;
    font-family: inherit; font-size: 12px; line-height: 22px;
    color: var(--ink);
  }
  .input-scroll textarea::placeholder { color: #b39a75; }
  /* HP bar 风格计数 */
  .meta-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 4px 8px; background: var(--ink); color: var(--paper);
    font-size: 10px; letter-spacing: 1px; margin-bottom: 12px;
  }
  .hp-bar {
    flex: 1; height: 8px; background: #333;
    margin: 0 8px; border: 2px solid var(--paper);
    position: relative;
  }
  .hp-bar::before {
    content: ''; position: absolute; inset: 0;
    background: var(--grass); width: 65%;
  }
  /* action button - RPG confirm */
  .action-btn {
    width: 100%; padding: 14px;
    font-family: inherit; font-size: 14px; letter-spacing: 3px;
    background: var(--brand); color: var(--ink);
    border: 4px solid var(--ink);
    cursor: pointer;
    box-shadow: 5px 5px 0 var(--ink);
    margin-bottom: 14px;
    transition: all 0.05s steps(1);
  }
  .action-btn:hover { background: #ffe066; }
  .action-btn:active {
    transform: translate(3px, 3px);
    box-shadow: 2px 2px 0 var(--ink);
  }
  /* output - dialogue box */
  .dialogue {
    background: var(--paper); border: 4px solid var(--ink);
    padding: 14px; position: relative;
    box-shadow: 4px 4px 0 var(--ink);
    font-family: 'Zpix', monospace;
    font-size: 13px; line-height: 1.7;
  }
  .dialogue::before {
    content: '▼';
    position: absolute; bottom: 6px; right: 12px;
    color: var(--brand-dark);
    animation: blink 0.8s steps(2) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  .npc-tag {
    position: absolute; top: -14px; left: 12px;
    background: var(--brand); color: var(--ink);
    padding: 2px 10px; font-size: 10px;
    border: 3px solid var(--ink);
    letter-spacing: 2px;
  }
  .footer {
    text-align: center; margin-top: 14px;
    font-size: 9px; color: var(--ink-soft); letter-spacing: 2px;
  }
  .heart { color: var(--brand-dark); }
</style>
</head>
<body>
  <div class="panel">
    <header>
      <div class="duck-pixel"></div>
      <div class="brand">
        <h1>校对鸭</h1>
        <p>v0.4 · PIXEL EDITION</p>
      </div>
      <div class="coins">⚡ 42</div>
    </header>

    <div class="engines-hud">
      <div class="slot active"><span class="icon"></span>C-AI</div>
      <div class="slot active"><span class="icon"></span>FREE</div>
      <div class="slot locked"><span class="icon"></span>WEB</div>
      <div class="slot locked"><span class="icon"></span>API</div>
    </div>

    <div class="mode-scroll">
      <div class="tab">摘要</div>
      <div class="tab">纠错</div>
      <div class="tab">润色</div>
      <div class="tab active">翻译</div>
      <div class="tab">扩写</div>
    </div>

    <div class="langs">
      <div class="lang from"><span class="flag">🇬🇧</span>EN</div>
      <div class="swap">⇄</div>
      <div class="lang"><span class="flag">🇨🇳</span>ZH</div>
    </div>

    <div class="input-scroll">
      <textarea placeholder="在这里输入文字...">Machine learning is a subfield of artificial intelligence.</textarea>
    </div>

    <div class="meta-bar">
      <span>MP</span>
      <div class="hp-bar"></div>
      <span>57/500</span>
    </div>

    <button class="action-btn">▶ 开始翻译</button>

    <div class="dialogue">
      <div class="npc-tag">🦆 校对鸭</div>
      机器学习是人工智能的一个子领域。
    </div>

    <div class="footer">✧ PRESS ANYWHERE TO CONTINUE ✧</div>
  </div>
</body>
</html>
