<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff9db"/>
      <stop offset="50%" stop-color="#fff5f5"/>
      <stop offset="100%" stop-color="#e7f5ff"/>
    </linearGradient>
    <linearGradient id="duckyellow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd43b"/>
      <stop offset="100%" stop-color="#f59f00"/>
    </linearGradient>
    <filter id="softshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.15"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 装饰圆点 -->
  <circle cx="100" cy="100" r="6" fill="#f59f00" opacity="0.4"/>
  <circle cx="1100" cy="80" r="8" fill="#1c7ed6" opacity="0.3"/>
  <circle cx="80" cy="550" r="10" fill="#0ca678" opacity="0.3"/>
  <circle cx="1120" cy="540" r="7" fill="#7048e8" opacity="0.3"/>

  <!-- 大鸭子 -->
  <g transform="translate(120,180)" filter="url(#softshadow)">
    <!-- 鸭身 -->
    <ellipse cx="130" cy="150" rx="120" ry="80" fill="url(#duckyellow)"/>
    <!-- 鸭头 -->
    <circle cx="200" cy="80" r="70" fill="url(#duckyellow)"/>
    <!-- 鸭嘴 -->
    <path d="M258,72 Q315,78 305,105 Q265,112 253,92 Z" fill="#f76707"/>
    <path d="M258,88 Q296,92 293,102 L262,98 Z" fill="#e8590c"/>
    <!-- 眼睛 -->
    <circle cx="212" cy="70" r="10" fill="#212529"/>
    <circle cx="215" cy="66" r="4" fill="#fff"/>
    <!-- 翅膀 -->
    <path d="M100,140 Q130,180 170,200 Q170,175 150,140 Z" fill="#ffd43b" stroke="#fab005" stroke-width="1.5"/>
    <!-- 校对勾 -->
    <g transform="translate(50,130)">
      <circle cx="0" cy="0" r="30" fill="#0ca678"/>
      <path d="M-14,2 L-4,12 L14,-8" stroke="#fff" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- 标题 -->
  <text x="500" y="230" font-family="-apple-system, PingFang SC, sans-serif" font-size="96" font-weight="800" fill="#212529">
    校对鸭
  </text>
  <text x="500" y="240" font-family="-apple-system, PingFang SC, sans-serif" font-size="96" font-weight="800" fill="#f59f00">
    <tspan x="750" dy="0">🦆</tspan>
  </text>

  <text x="500" y="290" font-family="-apple-system, PingFang SC, sans-serif" font-size="34" font-weight="600" fill="#495057">
    浏览器里的隐私 AI 翻译 / 校对助手
  </text>

  <!-- 4 引擎 tag -->
  <g transform="translate(500,340)" font-family="-apple-system, PingFang SC, sans-serif" font-size="20" font-weight="600">
    <g>
      <rect x="0" y="0" width="160" height="46" rx="23" fill="#e7f5ff" stroke="#1c7ed6" stroke-width="2"/>
      <text x="80" y="30" text-anchor="middle" fill="#0b5394">🤖 chrome-ai</text>
    </g>
    <g transform="translate(175,0)">
      <rect x="0" y="0" width="140" height="46" rx="23" fill="#f3f0ff" stroke="#7048e8" stroke-width="2"/>
      <text x="70" y="30" text-anchor="middle" fill="#4c3399">🧠 webllm</text>
    </g>
    <g transform="translate(330,0)">
      <rect x="0" y="0" width="200" height="46" rx="23" fill="#e6fcf5" stroke="#0ca678" stroke-width="2"/>
      <text x="100" y="30" text-anchor="middle" fill="#087f5b">🔗 openai-compat</text>
    </g>
  </g>

  <!-- 特性 bullet -->
  <g transform="translate(500,430)" font-family="-apple-system, PingFang SC, sans-serif" font-size="22" fill="#212529">
    <text x="0" y="0">🔒 本地推理 · 隐私优先</text>
    <text x="0" y="36">🔑 BYOK · 支持任意 OpenAI 兼容 API</text>
    <text x="0" y="72">⚡ 开源 MIT · 247 单测 · 30 E2E</text>
  </g>

  <!-- 底部 URL -->
  <text x="600" y="600" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="22" font-weight="600" fill="#868e96">
    github.com/gandli/ai-proofduck-extension
  </text>
</svg>
