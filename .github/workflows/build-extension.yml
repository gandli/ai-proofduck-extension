name: Build Extension

on:
  push:
    tags:
      - 'v*'
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version (e.g. 0.1.5). Empty = no tag/release'
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            TAG="${GITHUB_REF_NAME}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.release_version }}" ]]; then
            VERSION="${{ inputs.release_version }}"
            TAG="v${VERSION}"
          else
            VERSION=""
            TAG=""
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Create and push release tag (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch' && steps.release_meta.outputs.tag != ''
        shell: bash
        run: |
          TAG="${{ steps.release_meta.outputs.tag }}"
          git fetch --tags
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skip"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "$TAG"
          git push origin "$TAG"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build and Zip Extension
        run: |
          bun run zip
          bun run zip:firefox

      - name: Build CRX
        run: |
          # Generate a private key for signing if not provided
          openssl genrsa -out key.pem 2048

          # Install crx3 tool
          bun add -g crx3

          # Pack the extension (dist folder) into a CRX
          # The dist folder is created by 'bun run build', which is run implicitly by 'bun run zip' 
          # but let's be explicit and ensure we have the unpacked build first.
          bun wxt build

          # Use crx3 to pack the output directory
          # wxt outputs to 'dist' (unpacked) based on our config.
          # We need to find the manifest.json directory.
          # WXT builds to dist/chrome-mv3 (or similar depending on target).
          # Let's target the chrome build.
          crx3 dist/chrome-mv3 -p key.pem -o dist/ai-proofduck.crx

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-builds
          path: |
            dist/*.zip
            dist/*.crx

      - name: Build Changelog
        if: steps.release_meta.outputs.tag != ''
        id: build_changelog
        uses: mikepenz/release-changelog-builder-action@v4
        with:
          configuration: '.github/changelog_config.json'
          commitMode: true
          toTag: ${{ steps.release_meta.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update CHANGELOG.md
        if: steps.release_meta.outputs.tag != ''
        shell: bash
        run: |
          VERSION="${{ steps.release_meta.outputs.version }}"
          TAG="${{ steps.release_meta.outputs.tag }}"
          DATE="$(date +%Y-%m-%d)"

          if grep -q "## \[${TAG}\]" CHANGELOG.md; then
            echo "CHANGELOG already contains ${TAG}, skip"
            exit 0
          fi

          {
            echo "## [${TAG}] - ${DATE}"
            echo
            echo "${{ steps.build_changelog.outputs.changelog }}"
            echo
          } > /tmp/new_changelog_section.md

          awk 'NR==1{print;print "";system("cat /tmp/new_changelog_section.md");next}1' CHANGELOG.md > /tmp/CHANGELOG.md
          mv /tmp/CHANGELOG.md CHANGELOG.md

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs(changelog): update for ${TAG}" || true
          git push origin HEAD:main || true

      - name: Release
        if: steps.release_meta.outputs.tag != ''
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          body: ${{steps.build_changelog.outputs.changelog}}
          files: |
            dist/*.zip
            dist/*.crx
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
