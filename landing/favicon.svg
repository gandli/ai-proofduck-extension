<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff9db"/>
      <stop offset="100%" stop-color="#f59f00"/>
    </linearGradient>
  </defs>
  <!-- 圆角方形背景 -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- 简洁鸭子头像 -->
  <g transform="translate(6,10)">
    <!-- 鸭身 -->
    <ellipse cx="26" cy="30" rx="22" ry="14" fill="#fff"/>
    <!-- 鸭头 -->
    <circle cx="36" cy="18" r="12" fill="#fff"/>
    <!-- 鸭嘴 -->
    <path d="M46,17 Q54,18 52,23 Q46,24 44,21 Z" fill="#f76707"/>
    <!-- 眼睛 -->
    <circle cx="38" cy="16" r="2" fill="#212529"/>
    <circle cx="38.6" cy="15.4" r="0.7" fill="#fff"/>
    <!-- 校对勾 -->
    <path d="M14,32 L20,38 L34,24" stroke="#0ca678" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
